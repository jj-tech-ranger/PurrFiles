<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<title>PurrCare - Welcome</title>
<!-- Tailwind CSS CDN with plugins -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'pc-offwhite': '#FAFAFA',
            'pc-purple': '#5E35B1',
            'pc-pink-accent': '#F48FB1',
            'pc-purple-text': '#5E35B1',
          },
          fontFamily: {
            sans: ['"Inter"', 'ui-sans-serif', 'system-ui', '-apple-system', 'BlinkMacSystemFont', '"Segoe UI"', 'Roboto', '"Helvetica Neue"', 'Arial', 'sans-serif'],
          },
        }
      }
    }
  </script>
<style data-purpose="background-watermark">/* Custom style for the subtle paw print watermark trail */
.paw-watermark-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 0;
    opacity: 0.04;
    /* Very faint as requested */
    background-image: url(https://lh3.googleusercontent.com/aida-public/AB6AXuB8C2REFWxlC3ItE5Ib2IbvpmDh42fF3G-jjfFDiTGOyMqe9LDqL8NA_zFlHpIU85hQN1jRQoYle9H4Zt23XZ0Ypo8pvmo6nd3qMBzPCFILyVVo-djCUwFzWkoLJECnmJ34KDwRWUfOwBArzSvK9bgQ5btqO4EwQVJrlXGENupLTU89SPmU4X1aLDJVzbmmP-dx2LaFDSS-ePkFz5vbfF7FwyXtxkQQBFUBJbV2fC9mbFaiWyp3O0iRq6dvgNKrpFWQCtyXK_eG4f8);
    /* Placeholder for paw shape */
    background-repeat: repeat;
    background-size: 80px;
    /* Masking or pattern layering to simulate a 'trail' if needed, 
                 here used as a simple subtle texture for the minimalist look */
    }
/* Modern rounded font fallback */
body {
    font-family: "Inter", sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale
    }</style>
</head>
<body class="bg-pc-offwhite text-pc-purple-text h-screen w-full overflow-hidden">
<!-- BEGIN: BackgroundWatermark -->
<div aria-hidden="true" class="paw-watermark-overlay"></div>
<!-- END: BackgroundWatermark -->
<!-- BEGIN: MainContentContainer -->
<main class="relative z-10 flex flex-col items-center justify-between h-full w-full px-8 py-16">
<!-- Top Spacer to help with centering -->
<div class="flex-none h-4"></div>
<!-- BEGIN: CenterGraphicSection -->
<section class="flex flex-col items-center justify-center w-full" data-purpose="hero-illustration">
<!-- High-end 3D Vector Illustration Placeholder -->
<div class="relative w-full max-w-xs aspect-square flex items-center justify-center">
<!-- The cat is brown tabby, reaching for pink yarn ball -->
<img alt="Illustration of a playful tabby cat" class="w-full h-auto object-contain mix-blend-multiply" src="https://lh3.googleusercontent.com/aida-public/AB6AXuA8-5-YUtsaCd0KPg09nyRGeQzy5nSwEhNm_7Pk50Ym6s27XklSM9PgvEWCiLxbMNY6VpZdRLN1UsalzlIl4FLGdhVX7f4hFsmtPktyeBQtjhWkn1QZZQ6fHy7PoTJIGEqEDaZzQG9mjzz-57KWvggI4ccS6SEfd1_DodXkW4W5-srrjeKgNrDDAepK1S-dsh4pfcNRqMHcdDOlFdef0J_dAyGvtoCnfIgz7K_7gqtz8DzTNbtdRBNaDbde0tFW50i3R-RvqhEOiR8"/>
</div>
<!-- App Branding -->
<div class="mt-8 text-center" data-purpose="branding-container">
<h1 class="text-4xl font-bold tracking-tight text-pc-purple">
          PurrCare
        </h1>
<p class="mt-2 text-lg font-medium text-pc-purple/60">
          Your cat's health, decoded.
        </p>
</div>
</section>
<!-- END: CenterGraphicSection -->
<!-- BEGIN: ActionButtonsSection -->
<section class="w-full flex flex-col gap-4 mb-8" data-purpose="welcome-actions">
<!-- Top button: Create Account -->
<button class="w-full py-5 bg-pc-purple text-white rounded-full text-lg font-semibold shadow-lg shadow-pc-purple/20 active:scale-95 transition-transform" id="btn-create-account">
        Create Account
      </button>
<!-- Bottom button: Log In -->
<button class="w-full py-5 bg-transparent border-2 border-pc-purple text-pc-purple rounded-full text-lg font-semibold active:scale-95 transition-transform" id="btn-login">
        Log In
      </button>
</section>
<!-- END: ActionButtonsSection -->
</main>
<!-- END: MainContentContainer -->
<script data-purpose="touch-feedback">
    // Simple script to handle visual feedback on interaction
    document.querySelectorAll('button').forEach(button => {
      button.addEventListener('touchstart', () => {
        button.style.opacity = '0.9';
      });
      button.addEventListener('touchend', () => {
        button.style.opacity = '1';
      });
    });
  </script>
</body></html>
