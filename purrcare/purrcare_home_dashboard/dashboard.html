</div>

<main class="relative z-10 flex-1 px-6 flex flex-col gap-6">
<section class="w-full">
<div class="bg-accent/20 rounded-3xl p-8 flex flex-col items-center text-center shadow-sm border border-accent/10">
<div class="mb-6">
<span class="material-symbols-outlined text-primary text-6xl opacity-80">favorite</span>
</div>
<h3 class="text-primary text-2xl font-bold mb-8">How is Kate feeling today?</h3>
<button class="w-full max-w-xs bg-primary text-white py-4 rounded-full font-bold text-lg shadow-lg shadow-primary/20 hover:scale-[1.02] active:scale-[0.98] transition-transform">
                    Log Daily Health.
                </button>
</div>
</section>
<section class="grid grid-cols-2 gap-4 pb-24">
<div class="bg-white dark:bg-slate-800 p-5 rounded-2xl shadow-md border border-slate-100 dark:border-slate-700 flex flex-col gap-3">

<span class="text-primary/60 font-medium text-xs uppercase tracking-wider">Weight</span>
<span class="material-symbols-outlined text-primary text-lg">monitoring</span>
</div>
<div>
<p class="text-primary text-xl font-bold">4.5kg</p>

<path d="M0 25 Q 25 10, 50 20 T 100 5" stroke-linecap="round"></path>
</svg>
</div>
</div>
</div>
<div class="bg-white dark:bg-slate-800 p-5 rounded-2xl shadow-md border border-slate-100 dark:border-slate-700 flex flex-col gap-3">
<div class="flex items-center justify-between">
<span class="text-primary/60 font-medium text-xs uppercase tracking-wider">Next Appt</span>
<span class="material-symbols-outlined text-primary text-lg">calendar_today</span>
</div>
<div>
<p class="text-primary text-lg font-bold">Feb 12th</p>
<p class="text-slate-400 text-xs mt-1">Vet Clinic Visit</p>
<div class="mt-2 flex justify-end">
<span class="material-symbols-outlined text-accent text-xl">event_upcoming</span>
</div>
</div>
</div>
</section>

<div class="relative text-primary flex h-10 w-10 items-center justify-center">
<span class="material-symbols-outlined text-3xl font-variation-fill">pets</span>
</div>
</a>
<a class="flex flex-col items-center group" href="#">
