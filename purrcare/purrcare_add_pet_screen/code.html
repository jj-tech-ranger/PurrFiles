<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#5E35B1", // Deep soft purple
                        "accent": "#F48FB1",  // Pastel pink
                        "background-light": "#FAFAFA",
                        "background-dark": "#221610",
                    },
                    fontFamily: {
                        "display": ["Public Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "2xl": "1rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .paw-print-trail {
            background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 40c2 0 4-2 4-4s-2-4-4-4-4 2-4 4 2 4 4 4zm10-5c2 0 4-2 4-4s-2-4-4-4-4 2-4 4 2 4 4 4zm10 5c2 0 4-2 4-4s-2-4-4-4-4 2-4 4 2 4 4 4zm-10 15c4 0 8-4 8-8s-4-8-8-8-8 4-8 8 4 8 8 8z' fill='%23F48FB1' fill-opacity='0.05'/%3E%3C/svg%3E");
            background-repeat: repeat;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col relative overflow-x-hidden">
<!-- Background Watermark Decor -->
<div class="fixed inset-0 pointer-events-none paw-print-trail opacity-40"></div>
<!-- Top Navigation -->
<header class="relative z-10 flex items-center justify-center p-6">
<span class="text-accent font-semibold tracking-wide text-sm">Step 1 of 1</span>
</header>
<!-- Main Content Container -->
<main class="relative z-10 flex-grow px-6 pb-32">
<div class="max-w-md mx-auto">
<!-- Header Text -->
<h1 class="text-primary text-3xl font-bold leading-tight text-center mb-10">
                Tell us about your furry friend.
            </h1>
<!-- Upload Area & Illustration -->
<div class="flex items-center justify-center gap-6 mb-12">
<!-- Circular Avatar Placeholder -->
<div class="relative group">
<div class="w-32 h-32 rounded-full border-2 border-dashed border-accent flex items-center justify-center bg-white dark:bg-slate-800 transition-colors">
<span class="material-symbols-outlined text-primary text-4xl">add</span>
</div>
<div class="absolute -bottom-1 -right-1 bg-accent p-1.5 rounded-full shadow-sm">
<span class="material-symbols-outlined text-white text-xs">photo_camera</span>
</div>
</div>
<!-- Tabby Cat Illustration -->
<div class="w-24 h-24 flex items-center justify-center">
<img class="max-w-full max-h-full object-contain" data-alt="Vector illustration of a sitting brown tabby cat" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBEQ1Px7GaRvyXKQ3H1yfP3i76zYIUlTqjPv0_96_tgvFSSsP4pwXIsv6CmEHF9mjBUHVgOKAngjOTS_1FjA-xliUJzK-VKSlWIAdpRrlC5xnAi_OB7MaAsjaayTIixPKUHIDKXWQEt1OsDP6cSpwvR6fk6mUtSRD6bp_2qZ9trqRgB5D2PG1pbNZTh5W11v05h6GfRRbfqKRhwi_SFPqwUbcvvepy4_TgPlRQ_Ep86p2g2-T64zDMwfx2YqXQZGTSqNxJ6X1g6kS4"/>
</div>
</div>
<!-- Form Fields -->
<div class="space-y-6">
<!-- Cat's Name -->
<div class="flex flex-col gap-2">
<label class="text-primary text-sm font-semibold px-1">Cat's Name</label>
<input class="w-full h-14 px-5 rounded-2xl bg-slate-100 dark:bg-slate-800 border-none focus:ring-2 focus:ring-primary/20 text-slate-700 dark:text-slate-200 placeholder:text-slate-400" placeholder="Whiskers" type="text"/>
</div>
<!-- Breed -->
<div class="flex flex-col gap-2">
<label class="text-primary text-sm font-semibold px-1">Breed (Optional)</label>
<input class="w-full h-14 px-5 rounded-2xl bg-slate-100 dark:bg-slate-800 border-none focus:ring-2 focus:ring-primary/20 text-slate-700 dark:text-slate-200 placeholder:text-slate-400" placeholder="e.g. Maine Coon" type="text"/>
</div>
<!-- Age or Birthday -->
<div class="flex flex-col gap-2">
<label class="text-primary text-sm font-semibold px-1">Age or Birthday</label>
<div class="relative">
<input class="w-full h-14 px-5 rounded-2xl bg-slate-100 dark:bg-slate-800 border-none focus:ring-2 focus:ring-primary/20 text-slate-700 dark:text-slate-200 placeholder:text-slate-400" placeholder="Select date or age" type="text"/>
<span class="material-symbols-outlined absolute right-4 top-4 text-slate-400">calendar_today</span>
</div>
</div>
</div>
</div>
</main>
<!-- Sticky Footer Button -->
<footer class="fixed bottom-0 left-0 right-0 p-6 bg-gradient-to-t from-background-light via-background-light to-transparent dark:from-background-dark dark:via-background-dark z-20">
<div class="max-w-md mx-auto">
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-full shadow-lg transition-all active:scale-[0.98]">
                Complete Setup
            </button>
</div>
</footer>
</body></html>
