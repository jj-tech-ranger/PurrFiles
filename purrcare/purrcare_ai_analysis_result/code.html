<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Purr AI Diagnostic Result</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#5E35B1",
                        "accent": "#F48FB1",
                        "warning-bg": "#FFCDD2",
                        "background-light": "#FAFAFA",
                        "background-dark": "#221610",
                    },
                    fontFamily: {
                        "display": ["Public Sans"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display antialiased min-h-screen relative overflow-x-hidden">
<!-- Subtle Watermark Background -->
<div class="fixed inset-0 pointer-events-none opacity-[0.03] z-0 flex flex-col items-center justify-around overflow-hidden">
<span class="material-symbols-outlined text-[150px] rotate-12 ml-40 text-accent">pets</span>
<span class="material-symbols-outlined text-[120px] -rotate-12 -ml-20 text-accent">pets</span>
<span class="material-symbols-outlined text-[180px] rotate-45 ml-60 text-accent">pets</span>
<span class="material-symbols-outlined text-[100px] -rotate-45 -ml-40 text-accent">pets</span>
</div>
<div class="relative z-10 flex flex-col min-h-screen max-w-md mx-auto">
<!-- TopAppBar -->
<header class="flex items-center p-6 pb-2">
<button class="text-primary flex size-10 shrink-0 items-center justify-center hover:bg-primary/5 rounded-full transition-colors">
<span class="material-symbols-outlined text-3xl">arrow_back</span>
</button>
<h1 class="text-primary text-xl font-bold leading-tight tracking-tight flex-1 ml-2">Purr AI Analysis</h1>
</header>
<!-- Main Content Container -->
<main class="flex-1 p-6 space-y-8">
<!-- 1. Thumbnail Preview -->
<div class="flex justify-center">
<div class="relative group w-48 aspect-square rounded-2xl overflow-hidden shadow-xl shadow-primary/10 border-4 border-white">
<div class="w-full h-full bg-center bg-no-repeat bg-cover" data-alt="Close up photo of a cat's paw showing skin area" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuBj_Xzxx-IIwg-mLA7NBp0JB12v6Ich5LoFYMBuWPkgpcHvLySdK59btr39X0ZK40BZq_J5Vdv8i0p5ewj-vzwS4w0LJSe_FBAXQ9qY3265tyhp9hfKC93SJi9NtsyO4AENlk8GEZeA3bNNxI5KpFtAfqEZ9BvtkHnlXPsxVgZ_KZzDjzm1fiQ_5dlVL2FYJqDOQuLsBhUQMMXUhFuDyhASpuujgOqyEvb06oRGe3Jcevx0Myfk2zqnou_QLXOEzyNzdAJk_W-_2I4');">
</div>
<div class="absolute inset-0 bg-primary/10 group-hover:bg-transparent transition-colors"></div>
</div>
</div>
<!-- 2. Analysis Card -->
<div class="bg-background-light dark:bg-background-dark/50 border-2 border-accent/40 rounded-3xl p-8 shadow-sm">
<div class="flex items-start gap-4">
<div class="bg-accent/20 p-2 rounded-xl">
<span class="material-symbols-outlined text-primary">visibility</span>
</div>
<div>
<p class="text-primary text-lg font-medium leading-relaxed">
                            Based on the image, this appears to be a <span class="font-bold">mild skin irritation</span>.
                        </p>
<p class="text-primary/80 text-base mt-4 italic leading-relaxed">
                            "However, cats are masters at hiding pain."
                        </p>
</div>
</div>
</div>
<!-- Suggestion / Next Step -->
<div class="space-y-4">
<p class="text-primary/60 text-xs uppercase tracking-widest font-bold px-1">Recommended Action</p>
<button class="w-full py-4 bg-primary text-white rounded-2xl font-semibold shadow-lg shadow-primary/20 hover:scale-[1.02] active:scale-[0.98] transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-lg">medical_services</span>
                    Find a Local Clinic
                </button>
</div>
<!-- 3. Disclaimer -->
<div class="bg-warning-bg/60 border border-warning-bg rounded-2xl p-5 mt-auto">
<div class="flex gap-3">
<span class="material-symbols-outlined text-primary shrink-0">info</span>
<p class="text-primary text-sm font-bold leading-normal">
                        Disclaimer: Purr AI is not a veterinarian. Please consult a local clinic for a medical diagnosis.
                    </p>
</div>
</div>
</main>
<!-- Footer Padding (No Nav Bar) -->
<footer class="h-10"></footer>
</div>
</body></html>
