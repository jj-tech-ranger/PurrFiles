<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>PurrCare - Main Settings</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              colors: {
                "primary": "#5E35B1",
                "accent": "#F48FB1",
                "soft-red": "#E57373",
                "background-light": "#FAFAFA",
                "background-dark": "#221610",
              },
              fontFamily: {
                "display": ["Public Sans"]
              },
              borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
            },
          },
        }
      </script>
<style>
        .paw-watermark {
            background-image: radial-gradient(circle at 20% 30%, rgba(244, 143, 177, 0.03) 0%, transparent 10%),
                              radial-gradient(circle at 80% 60%, rgba(244, 143, 177, 0.03) 0%, transparent 10%),
                              radial-gradient(circle at 40% 90%, rgba(244, 143, 177, 0.03) 0%, transparent 10%);
            background-size: 200px 200px;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen">
<div class="relative flex h-full min-h-screen w-full flex-col overflow-x-hidden paw-watermark">
<!-- Top Navigation -->
<div class="flex items-center p-4 pt-6 pb-2 justify-between">
<button aria-label="Go back" class="text-primary flex size-12 shrink-0 items-center justify-start focus:outline-none">
<span class="material-symbols-outlined text-3xl">arrow_back</span>
</button>
<div class="flex-1"></div>
</div>
<!-- Header Section -->
<div class="px-6 py-4">
<h1 class="text-primary text-4xl font-bold leading-tight tracking-tight">Settings</h1>
</div>
<!-- Settings List Container -->
<div class="mt-4 flex flex-col px-4 gap-1">
<!-- Row 1: Account Details -->
<div class="flex items-center gap-4 bg-white dark:bg-slate-800/50 rounded-xl px-4 min-h-[72px] justify-between shadow-sm border border-slate-100 dark:border-slate-700/30">
<div class="flex items-center gap-4">
<div class="text-primary flex items-center justify-center rounded-full bg-primary/10 shrink-0 size-10">
<span class="material-symbols-outlined">person</span>
</div>
<p class="text-primary text-base font-semibold leading-normal flex-1 truncate">Account Details</p>
</div>
<div class="shrink-0">
<div class="text-primary/40 flex size-7 items-center justify-center">
<span class="material-symbols-outlined">chevron_right</span>
</div>
</div>
</div>
<!-- Row 2: Metric/Imperial Units -->
<div class="flex items-center gap-4 bg-white dark:bg-slate-800/50 rounded-xl px-4 min-h-[80px] py-3 justify-between shadow-sm border border-slate-100 dark:border-slate-700/30">
<div class="flex items-center gap-4">
<div class="text-primary flex items-center justify-center rounded-full bg-primary/10 shrink-0 size-10">
<span class="material-symbols-outlined">scale</span>
</div>
<div class="flex flex-col justify-center">
<p class="text-primary text-base font-semibold leading-normal line-clamp-1">Metric/Imperial Units</p>
<p class="text-primary/60 text-sm font-normal leading-normal">kg/lbs toggle</p>
</div>
</div>
<div class="shrink-0">
<label class="relative flex h-[28px] w-[48px] cursor-pointer items-center rounded-full border-none bg-slate-200 dark:bg-slate-700 p-1 has-[:checked]:justify-end has-[:checked]:bg-accent">
<div class="h-full w-[20px] rounded-full bg-white shadow-md"></div>
<input checked="" class="invisible absolute" type="checkbox"/>
</label>
</div>
</div>
<!-- Row 3: Currency Preferences -->
<div class="flex items-center gap-4 bg-white dark:bg-slate-800/50 rounded-xl px-4 min-h-[80px] py-3 justify-between shadow-sm border border-slate-100 dark:border-slate-700/30">
<div class="flex items-center gap-4">
<div class="text-primary flex items-center justify-center rounded-full bg-primary/10 shrink-0 size-10">
<span class="material-symbols-outlined">payments</span>
</div>
<div class="flex flex-col justify-center">
<p class="text-primary text-base font-semibold leading-normal line-clamp-1">Currency Preferences</p>
<p class="text-primary/60 text-sm font-normal leading-normal">KES</p>
</div>
</div>
<div class="shrink-0">
<div class="text-primary/40 flex size-7 items-center justify-center">
<span class="material-symbols-outlined">chevron_right</span>
</div>
</div>
</div>
<!-- Spacer for Separation -->
<div class="h-4"></div>
<!-- Row 4: Log Out -->
<div class="flex items-center gap-4 bg-white dark:bg-slate-800/50 rounded-xl px-4 min-h-[72px] justify-between shadow-sm border border-slate-100 dark:border-slate-700/30">
<div class="flex items-center gap-4">
<div class="text-soft-red flex items-center justify-center rounded-full bg-soft-red/10 shrink-0 size-10">
<span class="material-symbols-outlined">logout</span>
</div>
<p class="text-soft-red text-base font-semibold leading-normal flex-1 truncate">Log Out</p>
</div>
<div class="shrink-0">
<div class="text-soft-red/40 flex size-7 items-center justify-center">
<span class="material-symbols-outlined">chevron_right</span>
</div>
</div>
</div>
</div>
<!-- Bottom Branding Element -->
<div class="mt-auto p-10 flex flex-col items-center opacity-20">
<span class="material-symbols-outlined text-primary text-5xl">pets</span>
<p class="text-primary font-medium mt-2">PurrCare v1.2.0</p>
</div>
</div>
</body></html>
