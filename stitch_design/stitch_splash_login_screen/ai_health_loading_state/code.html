<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#4d0085",
                        "background-light": "#f7f5f8",
                        "background-dark": "#1b0f23",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }

<style>
    body {
      min-height: max(884px, 100dvh);

<body class="bg-background-light dark:bg-background-dark font-display">
<div class="relative flex h-screen w-full flex-col overflow-x-hidden">

</button>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-tight flex-1 ml-2">AI Health Checker</h2>
<div class="size-12"></div> <!-- Spacer for symmetry -->
</header>
<!-- Main Content Area -->
<main class="flex-1 flex flex-col items-center justify-center p-6 gap-8">
<!-- Loading Illustration Container -->
<div class="relative flex flex-col items-center justify-center">
<!-- Circular Ambient Glow -->
<div class="absolute w-64 h-64 bg-primary/5 rounded-full blur-3xl"></div>
<!-- Main Animation Placeholder -->
<div class="relative w-48 h-48 flex items-center justify-center bg-white dark:bg-slate-800 rounded-full shadow-lg border-4 border-primary/20">
<div class="w-full h-full flex items-center justify-center p-8">
<div class="w-full h-full bg-center bg-no-repeat bg-contain" data-alt="Minimalist cat silhouette chasing its tail illustration" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuCJgpp6jsXi7DoARVtXn8U_FUIERK8hdYszPDa6ShclHk3Zzm9v9BnKAIplh3MtPvH8LgukYh5PiceeUhsFuRCbA1EXJOjuncd-caw9v3_CWg2SkMLxF1QnzSxu6XOBdA_e9kcloyFP2mkaUabLOznstqzROYCqoWXI-peUDa1PS4OMB7aoRh1eu5JdUSL2VoDeSVNQmy2C37pfaevTerkUIstWM7zr1xXQqvLjlwLU7103ZtyaoNmN9JvjiYgGaOEj_9zU9OufDb7l');">
</div>
</div>
</div>
<!-- Spinning Progress Ring (Visual only) -->
<div class="absolute -inset-2 border-t-4 border-primary rounded-full animate-spin"></div>
</div>
<!-- Loading Text and Progress -->
<div class="w-full max-w-xs flex flex-col items-center gap-6">
<div class="text-center">
<h3 class="text-primary text-2xl font-extrabold leading-tight pb-2">Consulting the database...</h3>
<p class="text-slate-600 dark:text-slate-400 text-sm">Analyzing symptoms with AI models</p>
</div>
<!-- Custom Progress Bar -->
<div class="w-full h-3 bg-primary/10 rounded-full overflow-hidden">
<div class="h-full bg-primary rounded-full" style="width: 65%;"></div>
</div>
<div class="flex items-center gap-2 text-primary/60">
<span class="material-symbols-outlined text-sm">auto_awesome</span>
<span class="text-xs font-semibold uppercase tracking-widest">PurrCare AI Intelligence</span>
</div>
</div>
</main>
<!-- Tips Section -->
<section class="p-6 mb-8">
<div class="bg-white dark:bg-slate-800 p-5 rounded-xl border border-primary/10 shadow-sm">
<div class="flex gap-3 items-start">
<span class="material-symbols-outlined text-primary">lightbulb</span>
<div>
<h4 class="text-slate-900 dark:text-slate-100 font-bold text-sm">Did you know?</h4>
<p class="text-slate-600 dark:text-slate-400 text-sm mt-1">A cat's purr can range between 20 and 140 Hertz, which is known to be medically therapeutic for humans.</p>
</div>
</div>
</div>
</section>
</div>
