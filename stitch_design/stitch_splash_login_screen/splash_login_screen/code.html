<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#4d0085",
                        "accent-pink": "#FFB6C1",
                        "background-light": "#f7f5f8",
                        "background-dark": "#1b0f23",
                        "lavender-soft": "#E6E6FA",
                        "deep-purple": "#4B0082"
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display">
<div class="relative flex h-screen w-full max-w-[480px] mx-auto flex-col bg-lavender-soft dark:bg-background-dark overflow-hidden">
<!-- Paw Trail Decoration -->
<div class="absolute bottom-20 left-4 pointer-events-none opacity-60">
<span class="material-symbols-outlined text-accent-pink text-2xl absolute -bottom-4 left-0 rotate-[-45deg]">pets</span>
<span class="material-symbols-outlined text-accent-pink text-2xl absolute bottom-8 left-6 rotate-[-30deg]">pets</span>
<span class="material-symbols-outlined text-accent-pink text-2xl absolute bottom-20 left-14 rotate-[-15deg]">pets</span>
<span class="material-symbols-outlined text-accent-pink text-2xl absolute bottom-32 left-24 rotate-[0deg]">pets</span>
</div>
<!-- Main Content Area -->
<div class="flex flex-col items-center justify-center grow px-8">
<!-- Central Cat Silhouette Logo -->
<div class="w-48 h-48 bg-white rounded-full flex items-center justify-center shadow-sm mb-6">
<span class="material-symbols-outlined text-primary text-8xl" style="font-variation-settings: 'FILL' 1">pets</span>
</div>
<h1 class="text-deep-purple dark:text-slate-100 text-[42px] font-bold tracking-tight mb-2">
                PurrCare
            </h1>
<p class="text-deep-purple/70 dark:text-slate-300 text-center font-medium">
                Premium care for your feline friends
            </p>
</div>
<!-- Action Bottom Section -->
<div class="p-8 space-y-4">
<!-- Google Login Button -->
<button class="flex w-full cursor-pointer items-center justify-center rounded-xl h-14 px-6 bg-white text-slate-900 border border-slate-200 shadow-sm gap-3 hover:bg-slate-50 transition-colors">
<div class="flex h-6 w-6 shrink-0 items-center justify-center">
<svg height="20" viewbox="0 0 24 24" width="20" xmlns="http://www.w3.org/2000/svg">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
</div>
<span class="text-base font-bold">Continue with Google</span>
</button>
<!-- Email Login Link -->
<button class="w-full text-center py-2">
<span class="text-deep-purple dark:text-slate-100 font-semibold text-base hover:underline">
                    Email Login
                </span>
</button>
<!-- Bottom Spacer for mobile chin -->
<div class="h-6"></div>
</div>
<!-- Decorative Background Images (abstract patterns) -->
<div class="absolute -top-12 -right-12 w-48 h-48 bg-primary/5 rounded-full blur-3xl"></div>
<div class="absolute top-1/2 -left-20 w-40 h-40 bg-accent-pink/20 rounded-full blur-2xl"></div>
</div>
</body></html>
