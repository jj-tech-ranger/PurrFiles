<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#4d0085",
                        "background-light": "#f7f5f8",
                        "background-dark": "#1b0f23",
                        "accent-pink": "#ff69b4",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen">
<div class="relative flex h-auto min-h-screen w-full flex-col bg-background-light dark:bg-background-dark overflow-x-hidden">
<!-- Top Navigation -->
<div class="flex items-center bg-transparent p-4 pb-2 justify-between">
<div class="text-primary dark:text-primary/80 flex size-12 shrink-0 items-center cursor-pointer">
<span class="material-symbols-outlined text-3xl">arrow_back</span>
</div>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center pr-12">Pet Setup</h2>
</div>
<!-- Progress Indicator: 3 Glowing Paw Prints -->
<div class="flex w-full flex-row items-center justify-center gap-4 py-6">
<div class="flex items-center justify-center text-accent-pink drop-shadow-[0_0_8px_rgba(255,105,180,0.6)]">
<span class="material-symbols-outlined text-2xl" style="font-variation-settings: 'FILL' 1">pets</span>
</div>
<div class="flex items-center justify-center text-accent-pink drop-shadow-[0_0_8px_rgba(255,105,180,0.6)]">
<span class="material-symbols-outlined text-2xl" style="font-variation-settings: 'FILL' 1">pets</span>
</div>
<div class="flex items-center justify-center text-accent-pink drop-shadow-[0_0_12px_rgba(255,105,180,0.8)] scale-110">
<span class="material-symbols-outlined text-2xl" style="font-variation-settings: 'FILL' 1">pets</span>
</div>
</div>
<!-- Main Content -->
<div class="flex flex-col items-center px-6 pt-4 pb-10">
<h2 class="text-slate-900 dark:text-slate-100 tracking-tight text-[32px] font-extrabold leading-tight text-center pb-2">The Finishing Touch</h2>
<p class="text-slate-600 dark:text-slate-400 text-base font-normal leading-normal text-center max-w-xs">Luna is almost ready to join the PurrCare family!</p>
</div>
<!-- Upload Photo Section -->
<div class="flex flex-col items-center px-4 @container">
<div class="relative group cursor-pointer">
<!-- Circular Placeholder -->
<div class="bg-primary/5 dark:bg-primary/20 border-4 border-dashed border-primary/30 aspect-square rounded-full min-h-48 w-48 flex flex-col items-center justify-center gap-2 overflow-hidden relative">
<div class="absolute inset-0 bg-cover bg-center opacity-40 mix-blend-overlay" data-alt="Soft focused cute cat portrait background" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuBj3Z7fM56ZutaaB40saBOuGHH0qBKGbQTyiPIFY_F-nykoO-LAUEfG61syTc_RX2ZX41riSq6O3pvAt5OtZZ7CWouvnQDifHGgRtZn3cOAKaOLpUvjBDXRdRiicbxE1lt2zO_RCYkhne5dSObmxgh79h9hh2P84ES5MxfECIwOi-46eyRz6uMDcqOSeFq_2nS0sKYlRxCAYM50XZZ7gaQtuB-4dv-9cPIt_eqGlrcnRiaXnceO_An7U2pTyyI7zjQRWwl5aVVmO6mH');"></div>
<span class="material-symbols-outlined text-5xl text-primary z-10">add_a_photo</span>
<p class="text-primary font-bold text-lg z-10">Upload Photo</p>
</div>
<!-- Mini Badge -->
<div class="absolute bottom-2 right-4 bg-accent-pink text-white p-2 rounded-full shadow-lg border-4 border-background-light dark:border-background-dark">
<span class="material-symbols-outlined text-sm">edit</span>
</div>
</div>
<p class="text-slate-500 dark:text-slate-400 text-sm mt-6 font-medium">Add a profile picture for Luna</p>
</div>
<!-- Illustration/Decorative Area -->
<div class="flex-1 flex flex-col justify-center items-center p-8 mt-4">
<div class="relative w-full max-w-sm aspect-video bg-gradient-to-br from-primary/10 to-accent-pink/10 rounded-xl overflow-hidden flex items-center justify-center">
<!-- Cute Cat Illustration Substitute -->
<div class="text-primary/20 flex flex-col items-center">
<span class="material-symbols-outlined text-9xl">flutter_dash</span>
<div class="flex gap-2 mt-4">
<span class="material-symbols-outlined text-accent-pink animate-pulse">favorite</span>
<span class="material-symbols-outlined text-accent-pink animate-pulse" style="animation-delay: 0.2s">favorite</span>
<span class="material-symbols-outlined text-accent-pink animate-pulse" style="animation-delay: 0.4s">favorite</span>
</div>
</div>
<!-- Confetti Abstract Representation -->
<div class="absolute inset-0 pointer-events-none">
<div class="absolute top-4 left-10 w-2 h-2 rounded-full bg-accent-pink/40"></div>
<div class="absolute top-12 right-20 w-3 h-3 rounded bg-primary/30 rotate-12"></div>
<div class="absolute bottom-10 left-20 w-2 h-4 rounded-full bg-accent-pink/30 -rotate-45"></div>
<div class="absolute bottom-20 right-10 w-2 h-2 rounded-full bg-primary/40"></div>
</div>
</div>
</div>
<!-- Action Button -->
<div class="p-6 pb-12">
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-5 rounded-xl shadow-xl shadow-primary/20 transition-all flex items-center justify-center gap-3">
<span>Welcome Luna Home!</span>
<span class="material-symbols-outlined">celebration</span>
</button>
<p class="text-center mt-4 text-slate-400 dark:text-slate-500 text-sm">By finishing, you agree to our Pet Care Terms</p>
</div>
</div>
</body></html>
