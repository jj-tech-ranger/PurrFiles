<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Edit Luna's Profile - PurrCare</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#4d0085",
                        "background-light": "#f7f5f8",
                        "background-dark": "#1b0f23",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased">
<div class="relative flex h-auto min-h-screen w-full flex-col bg-background-light dark:bg-background-dark group/design-root overflow-x-hidden pb-10">
<!-- Top Navigation Bar -->
<div class="flex items-center bg-white dark:bg-slate-900 p-4 pb-2 justify-between sticky top-0 z-10 border-b border-primary/10">
<div class="text-primary flex size-12 shrink-0 items-center justify-center cursor-pointer">
<span class="material-symbols-outlined">arrow_back</span>
</div>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center pr-12">Edit Luna's Profile</h2>
</div>
<!-- Profile Picture Section -->
<div class="flex p-6 @container">
<div class="flex w-full flex-col gap-4 items-center">
<div class="flex gap-4 flex-col items-center relative">
<div class="relative group cursor-pointer">
<div class="bg-center bg-no-repeat aspect-square bg-cover rounded-full min-h-32 w-32 border-4 border-white dark:border-slate-800 shadow-lg" data-alt="Close up portrait of a fluffy cat" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuDugi507mUh5HUL_vOhLz90_1ZIx6IRUjdgNd32PQ7xfPGVhuPEQzrsxs00aeN29Z5yW_BU51MJ1g8jgRXrueQxyaClktEzzbVEtAyHFVNEMjJsWN5Ntv16fmriqviNSfNOfK8Baccf6MUyGDT2_bGjtdP9qNAYUlbkAx9DyCe8K8g9Dptc--q-ahX876OhL0exwHhQwxAfrXrivCAnqP7YYpYufpR_sP73xkGjj9x9JLbRQNWym2ZSxtgT4qXUbaDnGrM_m7GZjIXN");'>
</div>
<div class="absolute inset-0 flex items-center justify-center bg-black/30 rounded-full opacity-100 group-hover:bg-black/40 transition-all">
<span class="material-symbols-outlined text-white text-3xl">photo_camera</span>
</div>
</div>
<div class="flex flex-col items-center justify-center">
<p class="text-slate-900 dark:text-slate-100 text-[22px] font-bold leading-tight tracking-[-0.015em] text-center">Luna</p>
<p class="text-primary font-medium text-base leading-normal text-center cursor-pointer">Change Photo</p>
</div>
</div>
</div>
</div>
<!-- Form Section -->
<div class="flex flex-col gap-1 px-4">
<!-- Name Input -->
<div class="flex max-w-[480px] flex-wrap items-end gap-4 py-3">
<label class="flex flex-col min-w-40 flex-1">
<p class="text-slate-900 dark:text-slate-100 text-base font-semibold leading-normal pb-2">Name</p>
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-xl text-slate-900 dark:text-slate-100 focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-primary/20 bg-white dark:bg-slate-900 h-14 placeholder:text-slate-400 p-[15px] text-base font-normal leading-normal" value="Luna"/>
</label>
</div>
<!-- Breed Input -->
<div class="flex max-w-[480px] flex-wrap items-end gap-4 py-3">
<label class="flex flex-col min-w-40 flex-1">
<p class="text-slate-900 dark:text-slate-100 text-base font-semibold leading-normal pb-2">Breed</p>
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-xl text-slate-900 dark:text-slate-100 focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-primary/20 bg-white dark:bg-slate-900 h-14 placeholder:text-slate-400 p-[15px] text-base font-normal leading-normal" value="Ragdoll"/>
</label>
</div>
<!-- Birthday Input -->
<div class="flex max-w-[480px] flex-wrap items-end gap-4 py-3">
<label class="flex flex-col min-w-40 flex-1">
<p class="text-slate-900 dark:text-slate-100 text-base font-semibold leading-normal pb-2">Birthday</p>
<div class="flex w-full flex-1 items-stretch rounded-xl overflow-hidden border border-primary/20 bg-white dark:bg-slate-900">
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden text-slate-900 dark:text-slate-100 focus:outline-0 focus:ring-0 border-none bg-transparent h-14 placeholder:text-slate-400 p-[15px] pr-2 text-base font-normal leading-normal" value="May 12, 2021"/>
<div class="text-primary flex items-center justify-center pr-[15px] bg-transparent" data-icon="Calendar">
<span class="material-symbols-outlined">calendar_today</span>
</div>
</div>
</label>
</div>
<!-- Weight Input -->
<div class="flex max-w-[480px] flex-wrap items-end gap-4 py-3">
<label class="flex flex-col min-w-40 flex-1">
<p class="text-slate-900 dark:text-slate-100 text-base font-semibold leading-normal pb-2">Weight (kg)</p>
<div class="flex w-full flex-1 items-stretch rounded-xl overflow-hidden border border-primary/20 bg-white dark:bg-slate-900">
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden text-slate-900 dark:text-slate-100 focus:outline-0 focus:ring-0 border-none bg-transparent h-14 placeholder:text-slate-400 p-[15px] pr-2 text-base font-normal leading-normal" value="4.5"/>
<div class="text-primary flex items-center justify-center pr-[15px] bg-transparent" data-icon="Weight">
<span class="material-symbols-outlined">monitoring</span>
</div>
</div>
</label>
</div>
<!-- Health Interests Section -->
<div class="flex flex-col gap-3 py-4">
<p class="text-slate-900 dark:text-slate-100 text-base font-semibold leading-normal">Health Interests</p>
<div class="flex flex-wrap gap-2">
<button class="px-4 py-2 rounded-full bg-primary text-white text-sm font-medium border border-primary">
                        Nutrition
                    </button>
<button class="px-4 py-2 rounded-full bg-primary/10 text-primary text-sm font-medium border border-primary/20 hover:bg-primary hover:text-white transition-colors">
                        Weight Management
                    </button>
<button class="px-4 py-2 rounded-full bg-primary text-white text-sm font-medium border border-primary">
                        Senior Care
                    </button>
<button class="px-4 py-2 rounded-full bg-primary/10 text-primary text-sm font-medium border border-primary/20 hover:bg-primary hover:text-white transition-colors">
                        Dental Health
                    </button>
<button class="px-4 py-2 rounded-full bg-primary/10 text-primary text-sm font-medium border border-primary/20 hover:bg-primary hover:text-white transition-colors">
                        Mental Stimulation
                    </button>
<button class="px-4 py-2 rounded-full bg-primary text-white text-sm font-medium border border-primary">
                        Vaccinations
                    </button>
</div>
</div>
</div>
<!-- Footer Button -->
<div class="mt-auto p-4 flex flex-col gap-3">
<button class="w-full h-14 bg-primary text-white text-lg font-bold rounded-xl shadow-lg shadow-primary/20 active:scale-[0.98] transition-transform">
                Save Changes
            </button>
<button class="w-full h-14 bg-transparent text-primary text-base font-semibold rounded-xl hover:bg-primary/5 transition-colors">
                Archive Profile
            </button>
</div>
</div>
</body></html>
