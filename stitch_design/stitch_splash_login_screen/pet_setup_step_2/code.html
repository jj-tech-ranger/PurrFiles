<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>PurrCare - Pet Stats</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#4d0085",
                        "accent-pink": "#ff69b4",
                        "background-light": "#f7f5f8",
                        "background-dark": "#1b0f23",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen">
<div class="relative flex h-auto min-h-screen w-full max-w-md mx-auto flex-col bg-white dark:bg-slate-900 overflow-x-hidden shadow-2xl">
<!-- Top App Bar -->
<div class="flex items-center p-4 pb-2 justify-between">
<div class="text-primary dark:text-primary/80 flex size-12 shrink-0 items-center cursor-pointer">
<span class="material-symbols-outlined text-3xl">chevron_left</span>
</div>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-tight flex-1 text-center pr-12">PurrCare</h2>
</div>
<!-- Progress Indicator: Paw Prints -->
<div class="flex w-full flex-row items-center justify-center gap-6 py-8">
<div class="flex flex-col items-center gap-1 opacity-40">
<span class="material-symbols-outlined text-2xl text-primary">pets</span>
</div>
<div class="flex flex-col items-center gap-1">
<span class="material-symbols-outlined text-4xl text-accent-pink drop-shadow-[0_0_8px_rgba(255,105,180,0.6)]" style="font-variation-settings: 'FILL' 1">pets</span>
</div>
<div class="flex flex-col items-center gap-1 opacity-40">
<span class="material-symbols-outlined text-2xl text-primary">pets</span>
</div>
</div>
<!-- Header -->
<div class="px-6">
<h2 class="text-slate-900 dark:text-slate-100 tracking-tight text-3xl font-extrabold leading-tight text-center pb-2">Luna's Stats</h2>
<p class="text-slate-500 dark:text-slate-400 text-center text-sm mb-8">Tell us a bit more about Luna's physical details.</p>
</div>
<!-- Form Content -->
<div class="flex flex-col gap-6 px-6 overflow-y-auto flex-1">
<!-- Weight Input -->
<div class="flex flex-col w-full">
<label class="text-slate-700 dark:text-slate-300 text-sm font-semibold mb-2 ml-1">Weight (kg/lbs)</label>
<div class="relative">
<input class="w-full rounded-xl border-slate-200 dark:border-slate-700 dark:bg-slate-800 dark:text-white focus:ring-primary focus:border-primary h-14 px-4 text-base" placeholder="e.g. 4.5" type="text"/>
<div class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 font-medium">kg</div>
</div>
</div>
<!-- Birthday/Age Input -->
<div class="flex flex-col w-full">
<label class="text-slate-700 dark:text-slate-300 text-sm font-semibold mb-2 ml-1">Birthday / Age</label>
<div class="relative group">
<input class="w-full rounded-xl border-slate-200 dark:border-slate-700 dark:bg-slate-800 dark:text-white focus:ring-primary focus:border-primary h-14 px-4 pr-12 text-base" placeholder="Select date or enter age" type="text"/>
<div class="absolute right-4 top-1/2 -translate-y-1/2 text-primary">
<span class="material-symbols-outlined">calendar_today</span>
</div>
</div>
</div>
<!-- Breed Multi-select -->
<div class="flex flex-col w-full">
<label class="text-slate-700 dark:text-slate-300 text-sm font-semibold mb-2 ml-1">Breed</label>
<div class="relative">
<div class="w-full min-h-[56px] rounded-xl border border-slate-200 dark:border-slate-700 dark:bg-slate-800 p-2 flex flex-wrap gap-2 items-center">
<div class="bg-primary/10 text-primary px-3 py-1 rounded-full text-sm font-medium flex items-center gap-1 border border-primary/20">
                            Siamese
                            <span class="material-symbols-outlined text-sm cursor-pointer">close</span>
</div>
<div class="bg-primary/10 text-primary px-3 py-1 rounded-full text-sm font-medium flex items-center gap-1 border border-primary/20">
                            Mixed
                            <span class="material-symbols-outlined text-sm cursor-pointer">close</span>
</div>
<input class="flex-1 bg-transparent border-none focus:ring-0 text-slate-900 dark:text-white text-base min-w-[100px]" placeholder="Search breeds..." type="text"/>
<div class="text-slate-400 px-2">
<span class="material-symbols-outlined">search</span>
</div>
</div>
</div>
<div class="mt-2 flex flex-wrap gap-2">
<span class="text-[10px] uppercase font-bold text-slate-400 tracking-wider w-full mb-1">Suggestions</span>
<button class="text-xs py-1.5 px-3 rounded-full border border-slate-200 dark:border-slate-700 text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors">Persian</button>
<button class="text-xs py-1.5 px-3 rounded-full border border-slate-200 dark:border-slate-700 text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors">Maine Coon</button>
<button class="text-xs py-1.5 px-3 rounded-full border border-slate-200 dark:border-slate-700 text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors">Ragdoll</button>
</div>
</div>
</div>
<!-- Footer Buttons -->
<div class="p-6 mt-auto flex items-center gap-4 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md">
<button class="flex-1 h-14 rounded-xl border-2 border-primary/20 text-primary font-bold text-base hover:bg-primary/5 transition-colors flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-xl">arrow_back</span>
                Back
            </button>
<button class="flex-[2] h-14 rounded-xl bg-primary text-white font-bold text-base shadow-lg shadow-primary/30 hover:brightness-110 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
                Next Step
                <span class="material-symbols-outlined text-xl">arrow_forward</span>
</button>
</div>
<!-- Background Decoration -->
<div class="absolute -bottom-20 -right-20 w-64 h-64 bg-primary/5 rounded-full blur-3xl -z-10"></div>
<div class="absolute -top-20 -left-20 w-64 h-64 bg-accent-pink/5 rounded-full blur-3xl -z-10"></div>
</div>
</body></html>
