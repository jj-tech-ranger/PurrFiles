<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#4d0085",
                        "background-light": "#f7f5f8",
                        "background-dark": "#1b0f23",
                        "accent-pink": "#ff2d78",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<title>PurrCare - Pet Setup</title>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display min-h-screen flex items-center justify-center p-4">
<div class="relative flex h-full max-h-[900px] w-full max-w-[480px] flex-col bg-white dark:bg-background-dark shadow-2xl rounded-xl overflow-hidden border border-primary/10">
<!-- TopAppBar -->
<div class="flex items-center bg-white dark:bg-background-dark p-4 pb-2 justify-between">
<div class="text-slate-900 dark:text-slate-100 flex size-12 shrink-0 items-center justify-center cursor-pointer" data-icon="close">
<span class="material-symbols-outlined text-2xl">close</span>
</div>
<h2 class="text-primary dark:text-primary text-lg font-bold leading-tight tracking-tight flex-1 text-center pr-12">PurrCare</h2>
</div>
<!-- Progress Indicator (Paw Prints) -->
<div class="flex w-full flex-row items-center justify-center gap-6 py-8">
<div class="flex flex-col items-center">
<span class="material-symbols-outlined text-3xl text-accent-pink drop-shadow-[0_0_8px_rgba(255,45,120,0.6)]">pets</span>
<div class="mt-2 h-1.5 w-1.5 rounded-full bg-accent-pink"></div>
</div>
<div class="flex flex-col items-center">
<span class="material-symbols-outlined text-3xl text-primary/20 dark:text-primary/40">pets</span>
<div class="mt-2 h-1.5 w-1.5 rounded-full bg-primary/10 dark:bg-primary/20"></div>
</div>
<div class="flex flex-col items-center">
<span class="material-symbols-outlined text-3xl text-primary/20 dark:text-primary/40">pets</span>
<div class="mt-2 h-1.5 w-1.5 rounded-full bg-primary/10 dark:bg-primary/20"></div>
</div>
</div>
<div class="flex-1 px-6">
<h1 class="text-primary dark:text-primary tracking-tight text-[32px] font-bold leading-tight text-left pb-8 pt-2">
                Tell us about your furry friend.
            </h1>
<!-- Form Elements -->
<div class="space-y-8">
<!-- Name Input -->
<div class="flex flex-col w-full">
<label class="text-slate-900 dark:text-slate-100 text-base font-semibold leading-normal pb-3">Cat's Name</label>
<input class="form-input flex w-full rounded-xl text-slate-900 dark:text-slate-100 border border-primary/20 bg-primary/5 focus:ring-2 focus:ring-primary focus:border-primary h-14 placeholder:text-primary/40 p-4 text-base font-normal transition-all" placeholder="e.g. Luna" type="text"/>
</div>
<!-- Gender Toggle -->
<div class="flex flex-col w-full">
<label class="text-slate-900 dark:text-slate-100 text-base font-semibold leading-normal pb-3">Gender</label>
<div class="flex p-1.5 bg-primary/5 dark:bg-primary/10 rounded-xl w-full border border-primary/10">
<button class="flex-1 py-3 px-4 rounded-lg bg-primary text-white font-bold text-sm flex items-center justify-center gap-2 shadow-lg">
<span class="material-symbols-outlined text-lg">male</span>
                            Male
                        </button>
<button class="flex-1 py-3 px-4 rounded-lg bg-transparent text-primary dark:text-primary/80 font-bold text-sm flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-lg">female</span>
                            Female
                        </button>
</div>
</div>
<!-- Illustration Placeholder -->
<div class="flex justify-center pt-4">
<div class="w-48 h-48 bg-primary/5 rounded-full flex items-center justify-center relative">
<span class="material-symbols-outlined text-primary/20 text-8xl">potted_plant</span>
<div class="absolute bottom-4 right-4 bg-accent-pink/20 p-3 rounded-full">
<span class="material-symbols-outlined text-accent-pink text-3xl">heart_plus</span>
</div>
<div class="absolute -top-2 -left-2 bg-primary/10 p-4 rounded-full">
<span class="material-symbols-outlined text-primary/40 text-2xl">auto_awesome</span>
</div>
</div>
</div>
</div>
</div>
<!-- Primary Button -->
<div class="p-6 mt-auto">
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 px-6 rounded-xl text-lg flex items-center justify-center gap-2 shadow-xl shadow-primary/20 transition-all active:scale-[0.98]">
                Next
                <span class="material-symbols-outlined">arrow_forward</span>
</button>
</div>
</div>
</body></html>
